services:
    db:
        container_name: db-postgres
        image: postgres:15.2
        restart: always
        env_file:
            - ./backend/.env
        ports:
            - 5433:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - horwatch-backend
    prisma-studio: 
        container_name: prisma_db
        image: node:22-alpine
        working_dir: /usr/src/app
        volumes:
            - ./backend:/usr/src/app
        command: npx prisma studio --port 5555 --browser none
        ports: 
            - "5555:5555"
        env_file: 
            - ./backend/.env
        depends_on:
            - db
            - backend
        networks:
            - horwatch-backend
    backend:
        build: ./backend
        container_name: horwatch-backend
        ports:
            - "5000:5000"
        volumes:
            - ./backend:/app
        env_file:
            - ./backend/.env
    # frontend:
    #     build: ./frontend
    #     ports:
    #         - "3000:3000"
    #     volumes:
    #         - ./frontend:/app
    #     depends_on:
    #         - backend
volumes:
    postgres_data:
networks:
    horwatch-backend:
    prisma-network:
        name: prisma-network
    # howatch-frontend:
